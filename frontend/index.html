<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Gestor de Utilizadores e Tarefas - Mini Projeto Módulo 3. 
      Agora com a integração do backend, este projeto permite que você gerencie usuários e tarefas de forma eficiente.
      Com uma interface intuitiva, você pode criar, editar e excluir usuários, bem como atribuir tarefas a eles.
      A integração do backend garante que todas as suas ações sejam salvas e refletidas em tempo real, 
      proporcionando uma experiência de gerenciamento de tarefas fluida e eficaz."
    />
    <title>Mini Projeto Module 3</title>
    <link rel="canonical" href="./index.html" />
    <link rel="icon" href="./src/assets/favicon.ico" />
    <link rel="stylesheet" href="./src/styles/style.css" />
    <link rel="stylesheet" href="./src/styles/sidebar.css" />
    <link rel="stylesheet" href="./src/styles/statistics.css" />
    <script src="./dist/main.js" type="module" defer></script>
    <script
      src="https://kit.fontawesome.com/874e9efdc5.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <h1>ClickUp</h1>
    </header>
    <aside class="sidebar" role="navigation">
      <div class="left">
        <img src="./src/assets/logo.png" alt="Logo" />
        <button>
          <i class="fas fa-home"></i>
        </button>
      </div>
      <div class="right">
        <div class="right-inner">
          <div class="header">
            <div>
              <h2>Clickup</h2>
              <h3>Gestão de Projetos</h3>
            </div>
            <i class="fas fa-sort"></i>
          </div>
          <nav>
            <a id="menuStatistics" class="js-link">
              <i class="fas fa-chart-line"></i>
              <span>Dashboard</span>
            </a>
            <a id="menuProjects" class="js-link">
              <i class="fas fa-folder"></i>
              <span>Projetos</span>
            </a>
            <a id="menuUsers" class="js-link">
              <i class="fas fa-user"></i>
              <span>Utilizadores</span>
            </a>
            <a id="menuTasks" class="js-link">
              <i class="fas fa-tasks"></i>
              <span>Tarefas</span>
            </a>
          </nav>
        </div>
      </div>
    </aside>

    <main role="main">
      <section id="containerSection" class="container"></section>
    </main>

    <footer>
      <p>&copy; 2026 Developed by Danilson Sanches @upskill217</p>
    </footer>
    <script src="https://d3js.org/d3.v7.min.js"></script>
  </body>
</html>
